<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Issue 18302 - Snow Effect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="title">Issue 18302 - Snow Effect</div>
    <p style="color:#94a3b8;">Gentle snowflakes falling with horizontal drift</p>
  </div>
  <script>
    const snowCount = 50;
    for (let i = 0; i < snowCount; i++) {
      const flake = document.createElement('div');
      flake.className = 'snow-flake';
      const size = 2 + Math.random() * 6;
      flake.style.setProperty('--size', size + 'px');
      flake.style.setProperty('--left', Math.random() * 100 + '%');
      flake.style.setProperty('--duration', (4 + Math.random() * 6) + 's');
      flake.style.setProperty('--delay', Math.random() * 5 + 's');
      flake.style.setProperty('--drift', (50 + Math.random() * 100) + 'px');
      document.body.appendChild(flake);
    }
  </script>
</body>
</html>
