<!DOCTYPE html>
<!-- submissions/examples/animated-command-palette/demo.html -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Command Palette — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Simulation Control Interface -->
  <div style="text-align: center;">
    <h2 style="font-weight: 800; font-size: 1.75rem; margin-bottom: 0.5rem;">SaaS Command Palette</h2>
    <p style="color: #6b7280; font-size: 0.95rem; margin-bottom: 1.5rem;">Press the button or click <kbd style="background: #1f2937; padding: 2px 6px; border-radius: 4px;">Cmd + K</kbd> to explore.</p>
    <button class="trigger-palette-btn" id="btnOpenPalette">Open Command Palette</button>
  </div>

  <!-- CORE ANCHOR STRUCTURE (Initially Hidden via script toggle inline) -->
  <div class="ease-palette-overlay" id="paletteOverlay" style="display: none;">
    <div class="ease-command-palette">
      
      <!-- Search Component Header -->
      <div class="palette-search-wrapper">
        <span class="palette-search-icon">🔍</span>
        <input type="text" class="palette-input" id="paletteSearchInput" placeholder="Type a command or search documentation..." autocomplete="off">
      </div>

      <!-- Scrollable List Options Group -->
      <div class="palette-list" id="paletteContainerList">
        
        <p class="palette-group-title">Navigation</p>
        
        <div class="palette-item">
          <div class="palette-item-left">
            <span class="palette-item-icon">📁</span>
            <span class="palette-item-label">Go to Projects Dashboard</span>
          </div>
          <div class="palette-shortcuts">
            <span class="palette-key">⌘</span>
            <span class="palette-key">P</span>
          </div>
        </div>

        <div class="palette-item">
          <div class="palette-item-left">
            <span class="palette-item-icon">⚙️</span>
            <span class="palette-item-label">Open Account Settings</span>
          </div>
          <div class="palette-shortcuts">
            <span class="palette-key">⌘</span>
            <span class="palette-key">S</span>
          </div>
        </div>

        <p class="palette-group-title">Actions</p>

        <div class="palette-item">
          <div class="palette-item-left">
            <span class="palette-item-icon">✨</span>
            <span class="palette-item-label">Create New Workspace</span>
          </div>
          <div class="palette-shortcuts">
            <span class="palette-key">⌥</span>
            <span class="palette-key">N</span>
          </div>
        </div>

        <div class="palette-item">
          <div class="palette-item-left">
            <span class="palette-item-icon">🗑️</span>
            <span class="palette-item-label">Flush Production Cache</span>
          </div>
          <div class="palette-shortcuts">
            <span class="palette-key">⇧</span>
            <span class="palette-key">D</span>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- INTERACTIVE FUNCTIONAL LIFECYCLE CONTROLLER -->
  <script>
    const overlay = document.getElementById('paletteOverlay');
    const openBtn = document.getElementById('btnOpenPalette');
    const searchInput = document.getElementById('paletteSearchInput');
    const items = document.querySelectorAll('.palette-item');

    function togglePalette(isOpen) {
      if (isOpen) {
        overlay.style.display = 'flex';
        searchInput.focus();
      } else {
        overlay.style.display = 'none';
        searchInput.value = '';
        items.forEach(item => item.style.display = 'flex');
      }
    }

    // Toggle triggers
    openBtn.addEventListener('click', () => togglePalette(true));
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) togglePalette(false);
    });

    // Keyboard Shortcuts hooks (Cmd+K / Ctrl+K and Escape)
    window.addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
        e.preventDefault();
        togglePalette(true);
      }
      if (e.key === 'Escape') {
        togglePalette(false);
      }
    });

    // Search Filtering Mock Logic
    searchInput.addEventListener('input', (e) => {
      const query = e.target.value.toLowerCase();
      items.forEach(item => {
        const text = item.querySelector('.palette-item-label').textContent.toLowerCase();
        item.style.display = text.includes(query) ? 'flex' : 'none';
      });
    });
  </script>

</body>
</html>
