<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Issue 18303 - Fire Particle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="fire-container" id="fireContainer">
    <div class="title">Issue 18303 - Fire Particle</div>
    <p style="color:#94a3b8;">Rising fire ember particles</p>
  </div>
  <script>
    const container = document.getElementById('fireContainer');
    const particles = [];
    const colors = ['#ff4500', '#ff6347', '#ff8c00', '#ffa500', '#ffd700', '#ff6600'];

    function createParticle() {
      const el = document.createElement('div');
      el.className = 'fire-particle';
      const size = 3 + Math.random() * 5;
      el.style.width = size + 'px';
      el.style.height = size + 'px';
      el.style.left = (10 + Math.random() * 80) + '%';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.bottom = '0px';
      el.style.opacity = '1';
      container.appendChild(el);
      return el;
    }

    function animateParticles() {
      if (particles.length < 30 && Math.random() < 0.3) {
        particles.push({
          el: createParticle(),
          speed: 1 + Math.random() * 2,
          drift: (Math.random() - 0.5) * 2,
          opacity: 0.7 + Math.random() * 0.3,
          y: 0,
          x: 0
        });
      }

      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.y += p.speed;
        p.x += p.drift;
        p.opacity -= 0.005;
        p.el.style.transform = `translateX(${p.x}px) translateY(-${p.y}px)`;
        p.el.style.opacity = Math.max(0, p.opacity);
        if (p.opacity <= 0 || p.y > 300) {
          p.el.remove();
          particles.splice(i, 1);
        }
      }
      requestAnimationFrame(animateParticles);
    }
    animateParticles();
  </script>
</body>
</html>
